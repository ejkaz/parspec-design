# ════════════════════════════════════════════════════════════════════
# Parspec Design Model
# Single source of truth for Parspec brand. Read by parspec-slides and
# parspec-craft. Updated via the parspec-design skill.
# ════════════════════════════════════════════════════════════════════

meta:
  version: "2.0.0"
  brand_version: "2026-Q3-v1"
  source: "Parspec Brand v1 + BVIN slide 5 empirical evidence + 2-agent lock collaboration (Brand Marketer × Graphics Designer, May 2026)"
  updated: "2026-05-04"
  updated_by: "eric@parspec.io"
  status: "ratified"
  ratified: "2026-05-04"
  ratified_by: "eric@parspec.io"
  supersedes: "1.2.0"
  notes: |
    v1.0.0 — Initial brand v1 captured from the March 2026 Parspec Brand Guide PDF.
    Secondaries (Blueprint Blue #6270F2, Violet #8F6EF0, Deep Rose #BE123C) and
    pastel tints flagged in `avoid` because precedent research showed 0 of 27 ICP
    brands use this register.

    v1.1.0 — Architectural additions from 3-round design review (no brand-color
    change yet):
      - `roles:` block — two-tier token model (primitives → roles → semantic).
        Polaris/Carbon precedent. Every role token references exactly one primitive.
        Compile-time CTA monopoly enforcement instead of designer judgment.
      - `surfaces:` block — codifies brand-artifacts=dark, product-ui=light,
        documents=light. parspec-craft enforces mode-per-surface.
      - `tokens.typography` — explicit `letter_spacing` per scale step (Linear/Vercel
        pattern).

    v2.0.0 — Brand lock from 2-agent collaboration (Brand Marketer × Graphics
    Designer, R1+R2). See Parspec_Brand_Evolution/Reviews/Lock_Final_Synthesis.md
    for the full decision log. Bumps brand_version to 2026-Q3-v1, status
    "locked-pending-CEO-ratification."

    Major changes from 1.2.0:
      - `brand.600` nudged #FE7002 → #F58220 (Designer R1 craft fix; softens 9°
        hue break at .500→.600 to 5°)
      - `brand.700` updated to #C85F0F; `brand.800 #8C5800` added for
        accent-type-on-light (solves AA failure: Brand Orange on Off-white = 1.73:1)
      - Teal ramp tightened to 4 stops (100/300/500/700); .200 and .400 dropped
        as muddy at 12px on charcoal
      - NEW `steel:` primitive ramp (300/500/700) — Blueprint Blue, narrative
        job = engineering-document register (info_on_light, link, doc-metadata,
        schedule headers). Empirically deployed in CLI + Sales decks as #205991.
      - NEW `slate:` primitive ramp (50/300/500/700) — cool-neutral utility for
        body chrome, table borders, neutral chart fills. NOT a brand color.
      - NEW `status.warn = #B45309` Caution Amber — replaces `roles.warn:
        {brand.500}` placeholder (was an active CTA-monopoly violation)
      - NEW mode-aware status variants: error_on_dark / warn_on_dark / success_on_dark
        bound to lighter primitives that pass AA on Parspec Black
      - Roles refactored: mode-aware *_on_dark / *_on_light splits, narrative
        cool-family role bindings (info → steel; cool_primary → teal;
        body chrome → slate)
      - 4 NEW invariants: red_markup_monopoly (error), warn_not_brand (error),
        orange_type_on_light_forbidden (error), paper_warm_panel_only (warning),
        steel_is_doc_register (warning)

    v1.2.0 — Empirical evidence from internal decks (BVIN slide 5; CLI Project
    Management; Sales Management — May 2026 audit):
      - Brand orange ramp updated with BVIN-deployed variants:
          400: #FFAB40 (BVIN light) ← was #FFB44D
          600: #FE7002 (BVIN bright) ← was #E58F00
          700: #F66B00 (BVIN burnt) ← was #B36F00
        Charts now have a 4-step orange ramp inside one hue family — no need to
        reach for an off-brand secondary just to fill chart series.
      - NEW `teal:` primitive ramp anchored on two BVIN-deployed hexes:
          100: #A2C4C9 (BVIN pale teal — deployed as chart tint)
          500: #046F73 (BVIN deep teal — deployed as chart cool complement)
        Teal replaces the v1 Blueprint Blue / Violet / Deep Rose mess as the single
        complementary cool to Brand Orange. Adjacent to D4 Drafter Cyan (#0E7490)
        within ~6 ΔE — the team has organically converged on D4 territory.
      - NEW `cool_primary` / `cool_subtle` role tokens reference teal — provides
        chart series and soft-accent slots without designers reaching for hexes.
      - `#205991` steel-petrol-blue (CLI + Sales decks deployed) noted in
        `avoid.notes` as v2-emerging — TBD whether to add to primitives in v2.0.0
        post-CEO.

    Brand version stays 2026-Q1-original; brand v2.0.0 (post-CEO direction lock)
    will reuse these v1.2.0 primitives + add a steel-blue ramp (probably built on
    #205991 if CEO ratifies the BVIN/CLI/Sales empirical convergence).

    CEO proposal v5 at Parspec_Brand_Evolution/Artifacts/CEO_Proposal_2026-05-04_v5.pdf
    incorporates the BVIN slide 5 evidence and recommends a "fewer secondaries,
    deeper tonal discipline within each hue" framing — codifying what the team
    already does well in real artifacts.

# ────────────────────────────────────────────────────────────────────
# IDENTITY
# ────────────────────────────────────────────────────────────────────
name: "Parspec"
description: "AI-native operating system for construction materials distributors"
philosophy: |
  Industrial software register pulled from the visual vocabulary of Parspec's
  ICP — Construction Materials Distributors (Sonepar, Wesco, Border States,
  Rexel, Graybar). Black-anchored, orange-accented, Montserrat-set. The brand
  reads as utility software the buyer's customers' customers (MEP contractors)
  recognize as in-tribe — not consumer SaaS visiting from out of town.
primary_mode: "dark"
brand_source: "parspec.io + Parspec Brand Guidelines March 2026"
brand_domain: "B2B SaaS / construction materials distribution / MEP industry"
brand_type: "ui-rich"
mono_for_code: true
mono_for_metrics: false

# ────────────────────────────────────────────────────────────────────
# PRIMARY AXIS — LOCKED. Never modify these without explicit override.
# parspec-craft enforces these as required tokens.
# ────────────────────────────────────────────────────────────────────
primary_axis_preserved:
  description: |
    The immovable anchors of the Parspec brand. Any palette evolution may
    change secondaries, tints, motifs, or motion — but never these.
  parspec_black: "#0F0F0F"
  charcoal: "#2E2E2E"
  off_white: "#F2F2F2"
  white: "#FFFFFF"
  brand_orange: "#FFA72B"
  typography_family: "Montserrat"
  cta_color: "#FFA72B"
  motifs:
    - "corner-brackets"   # CAD viewfinder bracket marks
    - "quarter-circles"   # geometric quarter-circle arcs
    - "orange-line-illos" # single-color orange line illustrations on dark
    - "drawing-block-header"  # ★ NEW v2 signature motif — title/project/sheet/rev lockup; promoted from D4 personality after 3-round review (R3 Buyer + Marketer + Researcher unanimous)

# ────────────────────────────────────────────────────────────────────
# SURFACES — Mode-per-surface bindings (v1.1.0 architectural addition)
# Codifies the brand-vs-product mode split implicit since v1.0.0.
# parspec-craft enforces: a deck must use brand-artifacts mode (dark);
# product UI must use product-ui mode (light); documents likewise light.
# Inspired by the 3-round review's brand-vs-product framing.
# ────────────────────────────────────────────────────────────────────
surfaces:
  brand_artifacts:
    mode: dark
    examples: [decks, marketing, hero-sections, social-proof, conference-banners, investor-decks, sales-pdfs, case-studies]
    background: "{neutral.950}"        # Parspec Black
    text_primary: "{neutral.0}"         # White
    rationale: |
      The CEO proposal, sales decks, marketing site hero, and trade-show booth
      all sit in the dark register. This is the buyer's first impression of
      Parspec brand at the deal-side. Category leaders (Procore, Bluebeam,
      Autodesk Construction Cloud, ServiceTitan, Fieldwire) all run dark hero +
      dark brand artifacts.
  product_ui:
    mode: light
    examples: [app-screens, dashboards, forms, quoting-workspace, submittal-review, pm-tools]
    background: "{neutral.200}"        # Off-white
    text_primary: "{neutral.950}"      # Parspec Black
    rationale: |
      The Parspec product UI is light mode — appropriate for data-dense,
      all-day procurement workflows. Same as Procore, Bluebeam, Autodesk ACC,
      ServiceTitan, Fieldwire. Brand and product share the same primary axis;
      only the mode bindings differ.
  documents:
    mode: light
    examples: [contracts, term-sheets, formal-memos, customer-pdfs, invoices, AP-bound-artifacts]
    background: "{neutral.0}"          # Pure White (AP systems expect this)
    text_primary: "{neutral.950}"      # Parspec Black
    rationale: |
      Transactional documents (invoices, contracts) stay pure white because
      that's what accounts-payable systems expect. Per R3 ICP Buyer:
      "Don't put paper-warm on the invoice itself — the actual transactional
      document should stay white because that's what AP systems expect."
      Marketing PDFs and case studies use brand_artifacts mode (dark) instead.

# ────────────────────────────────────────────────────────────────────
# PRIMITIVES — Raw scales
# ────────────────────────────────────────────────────────────────────
primitives:
  colors:
    neutral:
      0:   "#FFFFFF"  # White
      50:  "#FAFAFA"
      100: "#F5F5F5"
      200: "#F2F2F2"  # Off-white (Parspec named)
      300: "#E5E5E5"
      400: "#D4D4D4"
      500: "#A3A3A3"
      600: "#737373"
      700: "#525252"
      800: "#3F3F3F"
      850: "#2E2E2E"  # Charcoal (Parspec named)
      900: "#1A1A1A"
      950: "#0F0F0F"  # Parspec Black (Parspec named)

    brand:              # Brand Orange — the hero color (v2.0.0 ramp)
      50:  "#FFF6E5"
      100: "#FFEACC"
      200: "#FFD699"
      300: "#FFC368"  # tint
      400: "#FFB549"  # tint (replaces v1.2.0 #FFAB40 with Designer's smooth-curve value)
      500: "#FFA72B"  # Brand Orange (LOCKED — primary CTA monopoly)
      600: "#F58220"  # ★ harmony nudge from #FE7002 — softens 9° hue break to 5°
      700: "#C85F0F"  # deeper burnt — UI fill stop only, NOT type
      800: "#8C5800"  # ★ accent_type_on_light — passes AA at 6.5:1 on off-white
      900: "#664000"
      950: "#332100"

    # Teal — cool complement (v2.0.0: 4-stop ramp; .200 + .400 dropped per
    # Designer R2 — interpolated mids muddy at 12px on charcoal ground).
    # Narrative job: chart cool / soft accent / brand cool complement (warm-cyan,
    # ocean register). Lives in both modes; product-UI hero secondary.
    teal:
      50:  "#E0F4F5"  # cool_subtle_surface role
      100: "#A2C4C9"  # ★ Pale Teal — BVIN slide 5 anchor (deployed). Dark-mode chart tint only — fails AA on light at 1.66:1
      300: "#50979E"  # mid, charcoal-legible at 12px
      500: "#046F73"  # ★ Deep Teal — BVIN slide 5 anchor (deployed). cool_primary; product-UI hero
      700: "#03494C"  # ★ cool_hero — biased away from ACC cyan thumbnail collision

    # ★ NEW v2.0.0 — Steel-Petrol (Blueprint Blue): the engineering-document
    # register. 3-stop ramp; empirically deployed as #205991 in CLI + Sales
    # decks (May 2026 audit). Distinct narrative job from teal: signals
    # engineering authority and document specificity (info_on_light, link,
    # doc-metadata, schedule-table headers, "click to open the spec").
    # Lives on light surfaces (6.47:1 AA pass); never dark-slide hero.
    steel:
      300: "#5A8AC4"  # tint, info_on_dark
      500: "#205991"  # ★ ANCHOR — empirical (CLI + Sales decks). Blueprint Blue
      700: "#143A60"  # deeper, doc title-block

    # ★ NEW v2.0.0 — Slate: cool-neutral utility (NOT a brand color).
    # Structural / utility role — body chrome, table borders, secondary text,
    # neutral chart fills, light-mode panel tints. Appears in both modes.
    # Distinct from steel (saturated brand-tinted blue) and teal (cool brand
    # complement) — slate is grayscale-cool with a subtle blue cast.
    slate:
      50:  "#F1F5F9"  # neutral_subtle_surface — product-UI panel tint
      300: "#94A3B8"  # info_on_dark for neutral data, body chrome on dark
      500: "#475569"  # info_on_light for neutral data; passes AA at 6.77:1 on off-white
      700: "#334155"  # data-secondary deep, table-header on light

    # ★ NEW v2.0.0 — Paper: warm document-tint ramp. Used ONLY as panel inset
    # inside dark slides (the "vellum on a dark drafting board" signature wedge).
    # Never a slide background — invariant `paper_warm_panel_only` enforces.
    paper:
      warm:    "#FAF7F0"  # ★ ANCHOR — paper-warm panel inset (the thumbnail wedge vs ACC)
      warm_50: "#FDFBF6"  # lighter, layered panels

    # ★ NEW v2.0.0 — Amber: status warning ramp. Caution Amber #B45309 anchor.
    # Replaces the v1.2.0 placeholder `roles.warn: {brand.500}` which was an
    # active CTA-monopoly violation. Distinct narrative job from brand orange:
    # signals "construction-site caution sign" / OVERDUE / warning state.
    # Locked semantic — never decorative, never in chart palette.
    amber:
      500: "#B45309"  # ★ Caution Amber — status.warn anchor; ΔL22 from CTA orange
      600: "#D97706"  # warn_on_dark — passes AA at 5.12:1 on Parspec Black

    # Legacy v1 secondaries — flagged for evolution.
    # Kept as primitives for backward-compat with brand-2026-Q1-original artifacts.
    legacy_v1:
      ember_red:     "#F04E23"  # OK
      blueprint_blue: "#6270F2" # FLAGGED — see `avoid`
      violet:        "#8F6EF0"  # FLAGGED — see `avoid`
      emerald_green: "#047857"  # OK-ish
      deep_rose:     "#BE123C"  # FLAGGED — see `avoid`

  spacing: [0, 4, 8, 12, 16, 24, 32, 48, 64, 96, 128]
  radii:   [0, 2, 4, 6, 8, 12, 16, 24, 999]

# ────────────────────────────────────────────────────────────────────
# ROLES — Two-tier token model (v1.1.0 architectural addition)
# Every role token references EXACTLY ONE primitive. Polaris/Carbon precedent.
# Compile-time enforcement of CTA monopoly etc. — parspec-craft lints any
# HTML where a hex literal is used for a role-mapped purpose without
# referencing the role token.
# ────────────────────────────────────────────────────────────────────
roles:
  # v2.0.0 — Refactored from 2-agent lock collaboration.
  # See Parspec_Brand_Evolution/Reviews/Lock_Final_Synthesis.md for decision log.
  # Naming convention: roles split by surface mode where the AA math diverges
  # (e.g., orange-as-type fails AA on light → use brand.800; passes AA on dark → use brand.500).

  # ─── Action verbs (CTA monopoly enforced) ───
  cta:                       "{brand.500}"        # Primary CTA fill — Brand Orange. Monopoly invariant.
  cta_hover:                 "{brand.600}"        # ★ now #F58220 (harmony nudge from v1.2.0 #FE7002)
  cta_active:                "{brand.700}"        # #C85F0F press state
  cta_text:                  "{neutral.950}"      # Black text on orange CTA fill

  # ─── Brand-orange type bindings (mode-aware — solves AA failure) ───
  accent_type_on_dark:       "{brand.500}"        # 9.87:1 on Parspec Black — PASS
  accent_type_on_light:      "{brand.800}"        # ★ NEW — #8C5800, 6.5:1 on off-white. NEVER brand.500 on light (1.73:1 — FAIL)

  # ─── Cool complement — Teal (chart cool, soft accent, brand cool register) ───
  cool_primary:              "{teal.500}"         # Deep Teal — product-UI hero secondary (5.32:1 on off-white)
  cool_hero:                 "{teal.700}"         # ★ NEW — #03494C, dark-slide hero (anti-ACC differentiation)
  cool_subtle_surface:       "{teal.100}"         # Pale Teal — dark-mode chart tint only (10.29:1 on black; 1.66:1 on light — fails)
  cool_chart_on_dark:        "{teal.300}"         # 12px-legible on charcoal

  # ─── Engineering doc register — Steel-Petrol (Blueprint Blue) ★ NEW ───
  # Narrative job: signals engineering authority + document specificity.
  # Lives on light surfaces (passes AA at 6.47:1). Distinct from teal (cool
  # complement) and slate (cool-neutral utility). parspec-craft lints if
  # used outside info_* / link / doc-metadata roles.
  info_on_light:             "{steel.500}"        # link, doc-metadata, schedule headers
  info_on_dark:              "{steel.300}"        # AA-passing on charcoal
  doc_title_block:           "{steel.700}"        # drawing-block header lockup, deep doc affordance

  # ─── Cool-neutral utility — Slate ★ NEW ───
  # Body chrome, table borders, secondary text, neutral chart fills.
  # NOT a brand color — utility only.
  body_chrome_on_light:      "{slate.500}"        # 6.77:1 on off-white
  body_chrome_on_dark:       "{slate.300}"        # 6.84:1 on Parspec Black
  border_neutral_dark:       "{slate.700}"
  border_neutral_light:      "{slate.300}"

  # ─── Status — semantic-locked (never decorative) ───
  status_error_on_light:     "{legacy_v1.ember_red}"  # #B91C1C, 5.78:1 on off-white
  status_error_on_dark:      "#EF4444"               # ★ red-500, 5.94:1 on black (AA-bound for dark)
  status_warn_on_light:      "{amber.500}"           # ★ #B45309 Caution Amber, 5.86:1 on off-white
  status_warn_on_dark:       "{amber.600}"           # ★ #D97706, 5.12:1 on black
  status_success_on_light:   "{legacy_v1.emerald_green}"  # #15803D, 4.48:1 on off-white
  status_success_on_dark:    "#22C55E"               # ★ green-500, 5.71:1 on black

  # ─── Surface tokens — keyed to surfaces.* mode bindings ───
  surface_dark:              "{neutral.950}"      # brand_artifacts mode background (Parspec Black)
  surface_dark_panel:        "{neutral.850}"      # Charcoal layering surface
  surface_dark_alt:          "{neutral.900}"
  surface_light:             "{neutral.200}"      # product_ui mode background (Off-white)
  surface_light_alt:         "{neutral.100}"
  surface_doc:               "{neutral.0}"        # documents mode (pure White — AP systems expect)
  surface_paper:             "{paper.warm}"       # ★ NEW — #FAF7F0 panel inset (NEVER slide background; invariant: paper_warm_panel_only)
  surface_subtle_cool:       "{teal.50}"          # #E0F4F5 light-mode panel tint
  surface_subtle_neutral:    "{slate.50}"         # #F1F5F9 product-UI panel tint

  # ─── Text tokens — split by mode (existing, unchanged) ───
  text_dark_primary:         "{neutral.0}"
  text_dark_secondary:       "{neutral.300}"
  text_dark_tertiary:        "{neutral.500}"
  text_light_primary:        "{neutral.950}"
  text_light_secondary:      "{neutral.700}"
  text_light_tertiary:       "{neutral.600}"

  # ─── Borders (delegate to slate ramp now) ───
  border_dark:               "{slate.700}"
  border_light:              "{slate.300}"

  # ─── Chart series — pre-built per-mode recipes (replaces v1.2.0 single-mode chart_1..5) ───
  # Designers reach for these instead of picking primitives ad-hoc.
  # Mode-aware: dark mode uses .300 stops where .500 fails AA.
  chart_1_light: "{brand.500}"       # Hero series — Brand Orange
  chart_2_light: "{teal.500}"        # Cool complement — Deep Teal
  chart_3_light: "{steel.500}"       # Blueprint Blue — engineering doc data
  chart_4_light: "{brand.700}"       # Burnt orange variant
  chart_5_light: "{teal.300}"        # Mid teal
  chart_6_light: "{slate.500}"       # Cool-neutral utility

  chart_1_dark:  "{brand.500}"       # 9.87:1 on Parspec Black — PASS
  chart_2_dark:  "{teal.300}"        # AA-bound for dark — .500 fails at 3.22:1
  chart_3_dark:  "{steel.300}"       # AA-bound for dark
  chart_4_dark:  "{brand.300}"       # tint variant
  chart_5_dark:  "{teal.100}"        # Pale teal tint (decorative chart layer only)
  chart_6_dark:  "{off_white}"       # Off-white as 6th series

# ────────────────────────────────────────────────────────────────────
# SEMANTIC TOKENS
# ────────────────────────────────────────────────────────────────────
tokens:
  colors:
    light:
      background:    "{neutral.200}"
      surface_1:     "{neutral.0}"
      surface_2:     "{neutral.100}"
      border:        "{neutral.300}"
      text_1:        "{neutral.950}"
      text_2:        "{neutral.700}"
      text_3:        "{neutral.600}"
      accent:        "{brand.500}"
      accent_subtle: "{brand.100}"
    dark:
      background:    "{neutral.950}"
      surface_1:     "{neutral.850}"
      surface_2:     "{neutral.900}"
      border:        "{neutral.800}"
      text_1:        "{neutral.0}"
      text_2:        "{neutral.300}"
      text_3:        "{neutral.500}"
      accent:        "{brand.500}"
      accent_subtle: "{brand.950}"
    success: "{legacy_v1.emerald_green}"
    warning: "{brand.500}"
    error:   "{legacy_v1.ember_red}"

  typography:
    family: "Montserrat"
    weights_used: [400, 500, 600, 700, 800, 900]
    # Tightened scale (v1.1.0) — explicit letter_spacing per step.
    # Linear/Vercel pattern: tight typography carries semantic-only color
    # without motion/illustration as a carry-layer. Required precondition
    # for warm role-locked accents (post-CEO v2.0.0).
    display: { weight: 900, size_clamp: "clamp(2.5rem, 6vw, 6rem)",       line_height: 1.00, letter_spacing: "-0.025em" }
    h1:      { weight: 800, size_clamp: "clamp(1.75rem, 4.5vw, 4rem)",    line_height: 1.05, letter_spacing: "-0.020em" }
    h2:      { weight: 700, size_clamp: "clamp(1.25rem, 3vw, 2.5rem)",    line_height: 1.10, letter_spacing: "-0.015em" }
    h3:      { weight: 700, size_clamp: "clamp(1rem, 2vw, 1.5rem)",       line_height: 1.15, letter_spacing: "-0.005em" }
    body:    { weight: 400, size_clamp: "clamp(0.85rem, 1.4vw, 1.15rem)", line_height: 1.50, letter_spacing: "0" }
    small:   { weight: 500, size_clamp: "clamp(0.7rem, 1vw, 0.9rem)",     line_height: 1.40, letter_spacing: "0.005em" }
    eyebrow: { weight: 600, size_clamp: "clamp(0.65rem, 0.85vw, 0.8rem)", line_height: 1.20, letter_spacing: "0.180em", transform: "uppercase" }
    caps:    { weight: 700, size_clamp: "clamp(0.85rem, 1.4vw, 1.15rem)", line_height: 1.30, letter_spacing: "0.050em", transform: "uppercase" }  # NEW v1.1.0 — for ALL-CAPS section heads (Parspec idiom)
    mono: null  # Parspec brand has no monospace pairing

  spacing:
    xs:  4
    sm:  8
    md:  16
    lg:  24
    xl:  32
    "2xl": 48
    "3xl": 64
    "4xl": 96

  radii:
    element:   2
    control:   4   # Buttons, inputs
    component: 8   # Cards, panels
    container: 12  # Modals
    pill:      999

  motion:
    personality: "mechanical"
    easing: "cubic-bezier(0.16, 1, 0.3, 1)"
    duration_fast:   "150ms"
    duration_normal: "300ms"
    duration_slow:   "600ms"
    reduced_motion_required: true  # Always include @media (prefers-reduced-motion: reduce)

  hero_stage:
    preset: "grid-on-dark"
    observed_style:
      description: |
        Black ground with orange line illustrations and signature corner-bracket
        and quarter-circle motifs. Yellow soft blurs behind product UI screenshots.
        No gradient mesh, no iridescent surfaces, no consumer-SaaS purple atmospherics.
      where_used: ["hero", "feature sections", "product UI screenshots"]
    background:
      medium: "flat"
      color_mode: "monochrome"
      saturation: "muted"
      light_source: "ambient"
      texture: "clean"
      motion: "static"
      intensity: "subtle"
      safe_zone: "full-bleed"
      color_palette: ["#0F0F0F", "#2E2E2E"]
    hero:
      subject: "object"
      placement: "center"
      scale: "balanced"
      tint: "warm"
    relation:
      type: "flat"
      bleed: 10

  iconography:
    observed_style:
      description: |
        Single-color orange line illustrations on dark backgrounds. Medium
        stroke (~2px). Bold, simple, conceptual — represent ideas at a high
        level. Categories: hard hat, blueprint, security shield, distribution
        node, ERP gear, factory, clipboard, browser/window — all in safety orange.
      stroke_weight: "medium"
      corner_treatment: "soft"
      fill_style: "outline"
      form_language: "geometric"
      visual_density: "minimal"
    fallback_kit:
      name: "Lucide"
      weight: "regular"
      match_score: "high"
      match_reasoning: |
        Lucide's outline + soft-corner + medium-stroke style is the closest
        freely-licensed kit to Parspec's orange line illustration system.
      cdn: "https://unpkg.com/lucide@latest"
      icon_class_prefix: "lucide-"
    sizes:
      inline: "16px"
      button: "20px"
      nav:    "24px"

# ────────────────────────────────────────────────────────────────────
# COMPONENTS — Specs read by parspec-slides for chrome
# ────────────────────────────────────────────────────────────────────
components:
  button_primary:
    source: "observed"
    background: "{brand.500}"
    color:      "{neutral.950}"
    padding:    "12px 24px"
    radius:     "{radii.control}"
    font_weight: 700
    font_family: "Montserrat"
    hover: { background: "{brand.600}" }

  button_secondary:
    source: "observed"
    background:  "transparent"
    color:       "{neutral.0}"
    border:      "1px solid {neutral.0}"
    padding:     "12px 24px"
    radius:      "{radii.control}"
    font_weight: 600

  card:
    source: "observed"
    background: "{neutral.850}"
    color:      "{neutral.0}"
    border:     "1px solid {neutral.800}"
    radius:     "{radii.component}"
    padding:    "{spacing.lg}"

# ────────────────────────────────────────────────────────────────────
# VOICE
# ────────────────────────────────────────────────────────────────────
voice:
  register: "operational, B2B, distributor-native"
  do:
    - "Lead with metrics and operational outcomes (e.g., 'Bid more. Win more. Profit more.')"
    - "ALL CAPS section headers — already a Parspec brand idiom"
    - "Reference customers by name in social proof (Sonepar, Graybar, Rexel, Wesco, Border States)"
    - "Use MEP industry vocabulary (quoting, submittals, O&M, ERP, project execution, takeoff)"
    - "Be terse and direct — no filler, no preamble"
  avoid:
    - "Consumer-SaaS hype language ('delight', 'magic', 'effortless', 'AI-powered everything')"
    - "Generic startup verbs ('unlock', 'empower', 'transform')"
    - "Lifestyle / wellness adjectives"
    - "Lorem ipsum — use real Parspec content or honest placeholders"
    - "Emoji in any user-facing copy"

# ────────────────────────────────────────────────────────────────────
# AVOID — Data-driven rules consumed by parspec-craft
# Each entry has: { color | font_family | pattern | color_family }, reason, severity
# parspec-craft loads this list and lints HTML against it.
# ────────────────────────────────────────────────────────────────────
avoid:
  # Legacy v1 secondaries flagged for evolution
  - color: "#6270F2"
    name: "Blueprint Blue (v1)"
    reason: "Reads consumer SaaS / Linear / Notion register. 0 of 27 ICP brands surveyed use this hue."
    severity: "warning"
  - color: "#8F6EF0"
    name: "Violet (v1)"
    reason: "Reads Figma / Loom / playful consumer. Wrong industry register for MEP distribution."
    severity: "warning"
  - color: "#BE123C"
    name: "Deep Rose (v1)"
    reason: "Reads fashion / lifestyle / cosmetics. Industrial brands use rust/oxide reds, not rose."
    severity: "warning"
  - color: "#FFEDD4"
    name: "Peach Tint (v1)"
    reason: "Pastel — zero precedent in ICP visual world. Reads café / boutique."
    severity: "warning"
  - color: "#E2E2FF"
    name: "Lavender Tint (v1)"
    reason: "Pastel — reads wedding stationery."
    severity: "warning"
  - color: "#C7C7FF"
    name: "Soft Violet Tint (v1)"
    reason: "Pastel — off-register for industrial."
    severity: "warning"
  - color: "#FFE4E7"
    name: "Rose Tint (v1)"
    reason: "Pastel — fashion register."
    severity: "warning"

  # Universal anti-AI-slop forbidden colors
  - color_family: "consumer-purple"
    description: "The #6366F1 / #8B5CF6 / #A78BFA Tailwind-indigo / consumer-SaaS-purple family."
    reason: "Generic AI-default palette. 0 of 27 ICP brands surveyed use this register."
    severity: "error"
  - color_family: "trust-gradient"
    description: "Purple-to-pink gradient backgrounds (#6366F1 → #EC4899 and similar)."
    reason: "Quintessential AI-slop visual. Reads as marketing-template-purchased, not brand."
    severity: "error"

  # Forbidden fonts
  - font_family: "Inter"
    reason: "Generic AI-default font. Montserrat is the locked Parspec choice."
    severity: "error"
  - font_family: "Roboto"
    reason: "Generic AI-default font. Montserrat is the locked Parspec choice."
    severity: "error"
  - font_family: "Arial"
    reason: "System default — never use as display. Montserrat is the locked Parspec choice."
    severity: "error"
  - font_family: "system-ui"
    reason: "Inherits OS defaults — never use as display. Montserrat is the locked Parspec choice."
    severity: "error"
  - font_family: "Helvetica"
    reason: "Reads corporate / generic. Montserrat is the locked Parspec choice."
    severity: "error"

  # Forbidden patterns
  - pattern: "rounded-card-with-colored-left-border"
    reason: "Overused B2B SaaS trope. Square corners + left border is fine; the combination of rounded corners + colored left border reads as AI slop."
    severity: "warning"
  - pattern: "emoji-as-icon"
    reason: "SVG icons (Lucide) only. Emojis read as casual / consumer."
    severity: "error"
  - pattern: "lorem-ipsum"
    reason: "Use real Parspec content or honest placeholders."
    severity: "warning"
  - pattern: "colored-customer-logos"
    reason: "Customer logos must be grayscale in social-proof rows. Reduces visual noise."
    severity: "warning"
  - pattern: "gradient-mesh-background"
    reason: "Iridescent / mesh-gradient hero backgrounds read as 2022 design template, not Parspec industrial."
    severity: "warning"

# ────────────────────────────────────────────────────────────────────
# INVARIANTS — Hard structural rules. parspec-craft enforces these.
# ────────────────────────────────────────────────────────────────────
invariants:
  viewport_fitting:
    rule: "Every .slide must have height: 100vh; height: 100dvh; overflow: hidden;"
    rationale: "No scrolling within slides ever. Content overflow → split into multiple slides."
    severity: "error"
  typography_scaling:
    rule: "ALL font sizes and spacing use clamp(min, preferred, max). Never fixed px or rem at the leaf."
    rationale: "Slides must render correctly at 1920×1080 down to landscape phones."
    severity: "error"
  reduced_motion:
    rule: "Include @media (prefers-reduced-motion: reduce) override in every output."
    rationale: "Accessibility baseline."
    severity: "error"
  cta_color_monopoly:
    rule: "Brand Orange #FFA72B is the only primary-CTA color. No secondary may be used as a primary CTA."
    rationale: "Preserves the action signal across every Parspec surface."
    severity: "error"
  customer_logos_grayscale:
    rule: "Customer logos are always grayscale, never colored."
    rationale: "Reduces visual noise in social-proof rows; lets the user's eye land on the brand orange CTA."
    severity: "warning"
  density_limits:
    rule: "Per slide: 1 heading + 4–6 bullets OR 2 paragraphs OR 6 cards (2×3/3×2) OR 8–10 lines of code OR 1 quote ≤3 lines OR 1 image ≤60vh."
    rationale: "Content overflow signals bad layout, not bad content. Split, never cram."
    severity: "warning"

  # ★ NEW v2.0.0 — added from 2-agent lock collaboration ★
  red_markup_monopoly:
    rule: "Engineering Red #B91C1C appears ONLY in error/markup/REV-stamp roles (status_error_*, drawing-block REV stamps). Never decorative, never in chart palette, never as a brand accent."
    rationale: "The drawing-block-header signature collapses if red leaks into chart series or button hover states. Same construction as cta_color_monopoly. Locking the rule prevents the next CMO/designer from re-litigating in 18 months."
    severity: "error"
  warn_not_brand:
    rule: "roles.status_warn_* MUST resolve to amber.500 / amber.600 (Caution Amber). Never brand.500 (Brand Orange)."
    rationale: "Brand Orange CTA + Brand Orange OVERDUE-warning is an active CTA-monopoly violation. Caution Amber #B45309 is a separate semantic hue family — same lock construction as red_markup_monopoly."
    severity: "error"
  orange_type_on_light_forbidden:
    rule: "Brand Orange (brand.500 #FFA72B) MUST NOT be used as type color on light surfaces (off-white, white, paper-warm). Use brand.800 #8C5800 for accent_type_on_light."
    rationale: "WCAG AA: brand.500 on Off-white = 1.73:1 — FAIL for normal text and large text. brand.800 on Off-white = 6.5:1 — PASS. Orange-as-fill on CTAs is fine; orange-as-type on light is the single biggest accessibility risk in the system."
    severity: "error"
  paper_warm_panel_only:
    rule: "surface_paper (paper-warm #FAF7F0) appears ONLY as a panel inset INSIDE dark slides. Never as a slide background, never as a product-UI surface."
    rationale: "Paper-warm-panel-on-dark is the single most-recognizable Parspec signature at thumbnail size — the wedge against Autodesk Construction Cloud's all-cool register. Dilution as a slide background collapses the signal."
    severity: "warning"
  steel_is_doc_register:
    rule: "Steel-Petrol (steel.500 #205991) appears ONLY in info_* / link_* / doc-metadata / schedule-header / drawing-block-header roles. Never in chart series without info semantics. Never as a brand accent."
    rationale: "Steel = Blueprint Blue narrative job (engineering authority + document specificity). Teal = brand cool complement (chart cool, soft accent). Slate = cool-neutral utility (body chrome, table borders). Three cools, three named jobs — collapse the role-locking and we're back in v1's swatch-book mess."
    severity: "warning"
